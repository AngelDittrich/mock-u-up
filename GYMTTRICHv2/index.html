<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Verification | Angel Dittrich</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Inter:wght@300;400;500&display=swap"
        rel="stylesheet">

    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Favicon -->
    <link rel="icon" href="./css/assets/logo-pwa.png" type="image/x-icon">
    <link rel="apple-touch-icon" href="./css/assets/logo-pwa.png">

    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#0f0f10">
    <link rel="stylesheet" href="css/splash.css">

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then((registration) => {
                        console.log('✅ Service Worker registered:', registration.scope);
                    })
                    .catch((error) => {
                        console.error('❌ Service Worker registration failed:', error);
                    });
            });
        }
    </script>


    <style>
        :root {
            --bg-app: #0f1115;
            --primary: #5e6ad2;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-app);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background */
        .bg-animation {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 10s infinite ease-in-out;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: #5e6ad2;
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: #26c6da;
            bottom: -150px;
            right: -100px;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 300px;
            height: 300px;
            background: #ff7043;
            top: 40%;
            left: 60%;
            opacity: 0.2;
            animation: float 15s infinite ease-in-out;
            animation-delay: -2s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translate(0, 0);
            }

            50% {
                transform: translate(30px, 50px);
            }
        }

        /* Login Container */
        .login-container {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 48px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: scaleIn 0.5s ease-out;
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary), #26c6da);
            border-radius: 50%;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: 700;
            color: white;
            box-shadow: 0 0 20px rgba(94, 106, 210, 0.5);
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            font-weight: 600;
        }

        p.subtitle {
            color: var(--text-muted);
            margin-bottom: 32px;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
        }

        .input-group {
            position: relative;
            margin-bottom: 24px;
        }

        input {
            width: 100%;
            padding: 16px 16px 16px 48px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(94, 106, 210, 0.2);
            background: rgba(0, 0, 0, 0.5);
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.2rem;
            transition: color 0.3s;
        }

        input:focus+.input-icon {
            color: var(--primary);
        }

        button {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Outfit', sans-serif;
        }

        button:hover {
            background: #4b56b0;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(94, 106, 210, 0.4);
        }

        .error-msg {
            color: #ff5252;
            font-size: 0.85rem;
            margin-top: 16px;
            font-family: 'Inter', sans-serif;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.3s;
            height: 0;
        }

        .error-msg.visible {
            opacity: 1;
            transform: translateY(0);
            height: auto;
        }

        /* Shake Animation */
        .shake {
            animation: shake 0.4s cubic-bezier(.36, .07, .19, .97) both;
        }

        @keyframes shake {

            10%,
            90% {
                transform: translate3d(-1px, 0, 0);
            }

            20%,
            80% {
                transform: translate3d(2px, 0, 0);
            }

            30%,
            50%,
            70% {
                transform: translate3d(-4px, 0, 0);
            }

            40%,
            60% {
                transform: translate3d(4px, 0, 0);
            }
        }
    </style>

    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

</head>

<body>

    <!-- Splash Screen -->
    <div id="splash-screen">
        <div class="splash-logo-container">
            <img src="css/assets/logo.jpeg" alt="GYMTTRICH Logo" class="splash-logo">
        </div>
        <div class="splash-loader"></div>
    </div>

    <script>
        // Splash Screen Logic
        window.addEventListener('load', () => {
            const splash = document.getElementById('splash-screen');
            setTimeout(() => {
                splash.classList.add('fade-out');
                setTimeout(() => {
                    splash.style.display = 'none';
                }, 600);
            }, 1500);
        });
    </script>

    <div class="bg-animation">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="login-container" id="loginCard">
        <div class="avatar">AD</div>
        <h1>Angel Dittrich</h1>
        <p class="subtitle">Personal Fitness Dashboard</p>

        <form id="loginForm">
            <div class="input-group">
                <input type="password" id="passwordInput" placeholder="Access Code" autocomplete="off">
                <i class="ph ph-lock-key input-icon"></i>
            </div>
            <button type="submit">Unlock Dashboard</button>
        </form>

        <div class="error-msg" id="errorMsg">
            <i class="ph ph-warning-circle"></i> Incorrect Access Code
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const input = document.getElementById('passwordInput');
        const errorMsg = document.getElementById('errorMsg');
        const card = document.getElementById('loginCard');

        const CORRECT_PASS = "Ang2204";

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const val = input.value;

            if (val === CORRECT_PASS) {
                // Guardar sesión
                sessionStorage.setItem('session', '1');
                // Success
                errorMsg.classList.remove('visible');
                // Persist session if needed, but for now just redirect
                // Animation out
                card.style.transform = 'scale(1.1)';
                card.style.opacity = '0';
                document.body.style.transition = 'opacity 0.5s';
                document.body.style.opacity = '0';

                setTimeout(() => {
                    // Get current path and construct dashboard URL
                    const currentPath = window.location.pathname;
                    const basePath = currentPath.substring(0, currentPath.lastIndexOf('/') + 1);
                    window.location.href = basePath + 'dashboard.html';
                }, 500);

            } else {
                // Fail
                errorMsg.classList.add('visible');
                card.classList.remove('shake');
                void card.offsetWidth; // trigger reflow
                card.classList.add('shake');
                input.value = '';
                input.focus();
            }
        });
    </script>
</body>

</html>
